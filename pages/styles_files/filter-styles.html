    .filter-line-block-agb::before{
        content: "";

        height: 2px;

    }

    .filter-line-block-agb .max-element-agb{

        top: 50%;

        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        margin-top: -15px;
        margin-left: -15px;
        width: 30px;
        height: 30px;
        outline: none;
        border: none;
        border-radius: 0;
        background: none;
        background-color: rgba(0, 0, 0, 0);
        background-color: transparent !important;
        cursor: ew-resize;
    }

    .filter-line-block-agb .min-element-agb{
        left:0%;
    }

    .filter-line-block-agb .min-element-agb::after{
        content: "";
        display: inline-block;
        width: 24px;
        height: 24px;
        border-radius:20px;
        background-color: #CACACA;
    }

    .filter-line-block-agb .max-element-agb{

    .filter-line-block-agb .max-element-agb::after{
