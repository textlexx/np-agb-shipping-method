<script>

	jQuery(document).ready(function(){

		select_image_for_field_2();
	});

	function select_image_for_field_2(){

		var custom_uploader;

		jQuery('.image-select-link-222').click(function(e) {
			e.preventDefault();

			var upload_button = jQuery(this);

			//Extend the wp.media object
			custom_uploader = wp.media.frames.file_frame = wp.media({
				title: 'Choose Image',
				button: {
					text: 'Choose Image'
				},
				multiple: false
			});

			//When a file is selected, grab the URL and set it as the text field's value
			custom_uploader.on('select', function() {
				var 
				attachment = custom_uploader.state().get('selection').first().toJSON(),
				
				elementImg = upload_button.closest('.control-img-field').
				siblings('.input-group-area').find('.selected-image-agb-222');

				upload_button.closest('.control-img-field').
				siblings('.input-group-area').find('.f_g_plg_img_id_values').val(attachment.id);

				elementImg.html('<img style="display:block;" src="'+attachment.url+'">');
			});

			//Open the uploader dialog
			custom_uploader.open();

		});

		jQuery('.delete_image_button').click(function(e) {
			e.preventDefault();

			var del_btn = jQuery(this);

			del_btn.closest('.control-img-field').
			siblings('.input-group-area').find('img').remove();

			del_btn.closest('.control-img-field').
			siblings('.input-group-area').find('.f_g_plg_img_id_values').val('');

			return false;
		});
	}

</script>
