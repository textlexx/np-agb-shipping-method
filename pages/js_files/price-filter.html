        jQuery( document ).on( "click", ".filter-line-block-agb", function(e) {

            var 
            jThis = jQuery(this);
            x = e.pageX,
            y = e.pageY, 
            elemWidth = Number(jThis.width()),
            onePercentValue = 100 / elemWidth,
            mousePlaceInPercent = (x - this.offsetLeft) * onePercentValue,
            min_BlockMusePlaceInPercent = 0,
            max_BlockMusePlaceInPercent = 0,
            distanceToNewPlaceOf_Min_Block = 0,
            distanceToNewPlaceOf_Max_Block = 0;

            
            min_BlockMusePlaceInPercent = parseInt(minBlock.css('left')) * onePercentValue;
            max_BlockMusePlaceInPercent = parseInt(maxBlock.css('left')) * onePercentValue;
            distanceToNewPlaceOf_Min_Block = mousePlaceInPercent - min_BlockMusePlaceInPercent;
            distanceToNewPlaceOf_Max_Block = max_BlockMusePlaceInPercent - mousePlaceInPercent;
            if(
                mousePlaceInPercent >= 0 && 
                mousePlaceInPercent < (max_BlockMusePlaceInPercent) && 
                // Esli k min bloky blizhe
                distanceToNewPlaceOf_Min_Block < distanceToNewPlaceOf_Max_Block
            ){

                minBlock.css('left', mousePlaceInPercent+'%');
                min_price_block.text(
                    Math.ceil(min_price_old_value + mousePlaceInPercent * price_na_odin_procent)
                );
            }else if(mousePlaceInPercent > (min_BlockMusePlaceInPercent)){

                maxBlock.css('left', mousePlaceInPercent+'%');
                max_price_block.text(
                    Math.ceil(min_price_old_value + mousePlaceInPercent * price_na_odin_procent)
                );
            }

            if(mousePlaceInPercent < 0){

                minBlock.css('left', 0+'%');
                min_price_block.text(
                    min_price_old_value
                );
            }

            if(mousePlaceInPercent > 100){

                maxBlock.css('left', 100+'%');
                max_price_block.text(
                    max_price_old_value
                );
            }

            //console.log(`${mousePlaceInPercent+'%'}`);
        });

        });

            window.STOP_FILTER_PRICE_MOVE_AGB = true;

        });

            window.STOP_FILTER_PRICE_MOVE_AGB = false;

                if(window.STOP_FILTER_PRICE_MOVE_AGB) return false;

                var 
                jThis = jQuery(this);
                x = e.pageX,
                y = e.pageY, 
                elemWidth = Number(jThis.width()),

function set_saved_filter_price(
    min_price_value, 
    max_price_value, 
    min_price_old_value,
    max_price_old_value,
    minBlock,
    maxBlock,
    min_price_block,
    max_price_block,
    price_na_odin_procent
){

    var 
    jThis = jQuery(".filter-line-block-agb"),
    elemWidth = Number(jThis.width()),
    onePercentValue = 100 / elemWidth,
    raznica = max_price_old_value - min_price_old_value,
    percent_for_correction = 100 / raznica,
    mousePlaceInPercent_min = (min_price_value - min_price_old_value) * percent_for_correction,
    mousePlaceInPercent_max = (max_price_value - min_price_old_value) * percent_for_correction;
    
    if(mousePlaceInPercent_min >=0 && mousePlaceInPercent_min <= 50){

        minBlock.css('left', mousePlaceInPercent_min+'%');
        min_price_block.text(
            Math.ceil(min_price_value)
        );
    }

    if(mousePlaceInPercent_max >=50 && mousePlaceInPercent_max <= 100){

        maxBlock.css('left', mousePlaceInPercent_max+'%');
        max_price_block.text(
            Math.ceil(max_price_value)
        );
    }

    if(mousePlaceInPercent_min < 0){

        minBlock.css('left', 0+'%');
        min_price_block.text(
            min_price_old_value
        );
    }

    if(mousePlaceInPercent_max > 100){

        maxBlock.css('left', 100+'%');
        max_price_block.text(
            max_price_old_value
        );
    }
}


function one_product_html_generate_agb(products, user_status = 0){

    var
    html = '',
    wishListBtnHtml = '';

    for (key in products) {

        if(user_status) wishListBtnHtml = '<div agb_product_id="'+products[key].id+'" class="btn-wishlist-add-now-agb"></div>';

        html += 
        '<li class="product post-'+products[key].id+'">'+
            '<div class="agb-loop-product-link-wrap-elem">'+
            wishListBtnHtml+
            '<a href="'+products[key].addition.url+'" '+
            'class="woocommerce-LoopProduct-link woocommerce-loop-product__link">'+
                '<div class="loop-image-wrap">'+
                    products[key].addition.onsale_html+
                    products[key].addition.image_html+
                    products[key].addition.quick_view_btn_html+
                '</div>'+
            '</a>'+
            '</div>'+
            products[key].addition.addition_block_html+
            products[key].addition.title_html+
            products[key].addition.price_html+
            products[key].addition.add_to_cart_btn_html+
        '</li>'
        ;
    }

    return html;
}


function get_category_id_agb(){

    var
    category_block = jQuery('.filter-category-div'),
    category_id = Number(category_block.attr('category_id'));

    // If no exists category return "0" it mean without category
    if(!category_block.hasClass('filter-category-div')) return 0;

    return category_id;
}


function get_min_price_agb(){

    var
    min_price_block = jQuery('.price-part-agb .first-price'),
    min_price_value = Number(min_price_block.text());
    
    // If no exists element of price or no exists price filter return "0" it mean without price
    if(!min_price_block.hasClass('first-price')) return 0;

    return min_price_value;
}

function get_max_price_agb(){

    var
    max_price_block = jQuery('.price-part-agb .second-price'),
    max_price_value = Number(max_price_block.text());

    // If no exists element of price or no exists price filter return "0" it mean without price
    if(!max_price_block.hasClass('second-price')) return 0;

    return max_price_value;
}
