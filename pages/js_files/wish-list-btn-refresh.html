<script>

function wish_list_btn_action_refresh(){

    jQuery(".btn-wishlist-add-now-agb").unbind('click');
    jQuery(".btn-wishlist-add-now-agb").click(function(e){

        var 
        _target = jQuery(e.target),
        product_id = 0;

        if(!_target.hasClass('btn-wishlist-add-now-agb')){

            _target = _target.closest('.btn-wishlist-add-now-agb');
        }

        product_id = _target.attr('agb_product_id');

        // Tolko levaya knopka mushi
        if(e.which != 1) return false;

        agbSiteLoaderShow_plugin();

        // Fields not empty must be
        if(product_id){

            var
            wishData = {
                'action' : 'add_product_in_wishlist_agb',
                'wish_list_product_id_agb' : product_id,
            };

            jQuery.ajax({
                type: "POST",
                url: "/wp-admin/admin-ajax.php",
                data: wishData,
                dataType: "json",
                success: function (data) {

                    if (data.status == "success") {

                        jQuery('.header-wishlist-icon .count-number').text(data.amount);
                        
                        jQuery(".fast-add-to-wish-list-text-agb").css("display", "block");

                        setTimeout(function(){

                            jQuery(".fast-add-to-wish-list-text-agb").fadeOut(400);
                        }, 3000);
                    } else {
                        
                        openErrorWindow_plugin(
                            data.errors
                        );
                        
                        //alert("error");
                    }

                    agbSiteLoaderHide_plugin();
                },
                error: function( jqXHR, textStatus, errorThrown ){
                    
                    openErrorWindow_plugin(errorThrown);
                    agbSiteLoaderHide_plugin();
                    //alert(errorThrown);
                }
            });
        }else{

            openErrorWindow_plugin('Error. No params.');
            agbSiteLoaderHide_plugin();
            return false;
        }
    });
}

</script>
