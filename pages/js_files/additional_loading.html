<script>

jQuery(document).ready(function(){

    set_actions_on_addition_load_btn();
});



function set_actions_on_addition_load_btn(count_page_number_agb = 0){

    // Allow products load if page reload
    window.load_in_progress_block_new_load = false;
    // Stop load products if products are over
    window.stop_load_forever_if_products_are_over = false;
    // Begin value of number page of products load
    window.count_page_number_agb = count_page_number_agb;
    
    window.remember_only_first_if_first_page_load = false;
    
    /*
    jQuery(document).scroll(function(){

        addition_loading_function_agb();
    });
    */

    if(jQuery('.btn-addition-loading-agb').hasClass('btn-addition-loading-agb')){

        jQuery('.btn-addition-loading-agb').remove();
    }

    var
    products_ul = jQuery('.site-main.sidebar-left ul.products');

    products_ul.after(
    '<div class="btn-addition-loading-agb">'+
        '<span>'+
            window.trslt_btn_addition_loading+
        '</span>'+
    '</div>'
    );

    jQuery(document).find('.btn-addition-loading-agb span').click(function(){

        addition_loading_function_agb();
    });
}



function addition_loading_function_agb(){

    var
    products_ul_block = jQuery('.site-main.sidebar-left ul.products'),
    product_block_height = Number(products_ul_block.outerHeight()),
    scroll_top = Number(jQuery(document).scrollTop()),
    window_height = Number(jQuery(window).outerHeight());

    // If go to bottom of the products block
    if(scroll_top >= (product_block_height - window_height / 1)){

        // Check if load allowed
        if(window.stop_load_forever_if_products_are_over) return false;
        if(window.load_in_progress_block_new_load) return false;
        //---------------------------------------------

        // Set block load if load in progress
        window.load_in_progress_block_new_load = true;
        //---------------------------------------------

        //alert('height: '+product_block_height+', scroll: '+scroll_top);

        var
        $dataAjax = '',
        category_id = get_category_id_agb(),
        pathname = document.location.pathname,
        page = 0;

        page = pathname.match(/\/page\/[0-9]+/i);
        page = (page) ? page[0].match(/[0-9]+$/i) : 0;
        page = (page) ? Number(page) : 0;

        window.count_page_number_agb++;

        if(page > 0 && !window.remember_only_first_if_first_page_load) {
            
            // Etot parametr zapominaet chto "page" bula polechena pri pervoj zagryzke stranicu
            // bez "ajax" i pri vtoroj proverke kogda rabotaet ajax dolzhen imet vozmpzhnost but
            // yvelechin schetchik stranic, inache budet zaciklivanie na odnoj i toj zhe stranice
            window.remember_only_first_if_first_page_load = true;
            window.count_page_number_agb = page;
        }

        dataAjax = 
        'action=ajax_products_adaptation_get'+
        '&addition_loading_agb=1'+
        '&category_id_agb='+category_id+
        '&page_num_agb='+window.count_page_number_agb+
        '&request_uri='+location.pathname+
        '&query_string='+encodeURIComponent(location.search)+
        '&hash_string='+location.hash;

        //loaderShowIfProgress();
        agbSiteLoaderShow_plugin();

        jQuery.ajax({
            type: "POST",
            url: "/wp-admin/admin-ajax.php",
            data: dataAjax,
            dataType: "json",
            success: function (data) {

                var
                parent_for_ul = jQuery('.site-main.sidebar-left'),
                products_ul = jQuery('.site-main.sidebar-left ul.products');

                if (data.status == "success") {

                    var
                    html = one_product_html_generate_agb(data.products, data.user_login_status),
                    dataH = history.state,
                    pathname = document.location.pathname,
                    blockOfProductsForPaginSet = jQuery('.product-category-item-layout1.site-main.sidebar-left');

                    if(!html) window.stop_load_forever_if_products_are_over = true;
                    
                    // If products are over stop add page in link
                    if(!window.stop_load_forever_if_products_are_over) {

                        if(!pathname){

                            history.pushState(
                                dataH, 'title', 
                                location.protocol+'//'+
                                location.hostname+
                                '/page/'+(window.count_page_number_agb + 1)+'/'+
                                location.search+
                                location.hash
                            );
                        }else{

                            pathname = pathname.replace(/\/page\/[0-9]+/i, '');
                            pathname = pathname.replace(/\/$/i, '');

                            if(!pathname){

                                // Izmenyaem url bravzera bez obnovleniya stranicu
                                history.pushState(
                                    dataH, 'title', 
                                    location.protocol+'//'+
                                    location.hostname+
                                    '/page/'+(window.count_page_number_agb + 1)+'/'+
                                    location.search+
                                    location.hash
                                );
                            }else{

                                // Izmenyaem url bravzera bez obnovleniya stranicu
                                history.pushState(
                                    dataH, 'title', 
                                    location.protocol+'//'+
                                    location.hostname+
                                    pathname+
                                    '/page/'+(window.count_page_number_agb + 1)+'/'+
                                    location.search+
                                    location.hash
                                );
                            }
                        }
                    }

                    jQuery('.site-main.sidebar-left .woocommerce-info').remove();
                    set_actions_on_addition_load_btn();
                    products_ul.append(html);
                    
                    fast_add_to_cart_and_attrs_marks_actions_refresh();
                    productAmountChangeFastBuy_plugin();
                    // Refresh fast buy btn action
                    fast_buy_refresh_action_agb();
                    wish_list_btn_action_refresh();

                    agb33da_fast_view_btn_product_popup_plugin();

                    //---------------------------------------------
                    // Allow load again if load is done
                    window.load_in_progress_block_new_load = false;
                    //---------------------------------------------

                    // Pagination
                    //---------------------------------------------
                    blockOfProductsForPaginSet.find('.woocommerce-pagination').remove();
                    blockOfProductsForPaginSet.append(data.pagin_html);
                    //---------------------------------------------

                    agbSiteLoaderHide_plugin();

                    //loaderHideIfProgress();
                    //loaderImageHide();
                    //successDivTextChange(data.successes.message);
                    //successDivShow();
                    //btnCloseShow();
                    //loaderShowIfProgress();
                } else {

                    //---------------------------------------------
                    // Allow load again if load is done
                    window.load_in_progress_block_new_load = false;
                    //---------------------------------------------
                    
                    //jQuery('.site-main.sidebar-left .woocommerce-info').remove();
                    // products_ul.before('<p class="woocommerce-info">'+data.errors.no_results+'</p>');
                    //products_ul.html('');
                    set_actions_on_addition_load_btn();

                    agbSiteLoaderHide_plugin();
                    
                    loaderHideIfProgress();
                    loaderImageHide();
                    errorDivTextChange(data.errors.message);
                    successDivHide();
                    processDivHide();
                    //errorDivShow();
                    //btnCloseShow();
                    //loaderShowIfProgress();
                    
                    //alert("error");
                }
            },
            error: function( jqXHR, textStatus, errorThrown ){

                //---------------------------------------------
                // Allow load again if load is done
                window.load_in_progress_block_new_load = false;
                //---------------------------------------------

                agbSiteLoaderHide_plugin();
                
                loaderHideIfProgress();
                loaderImageHide();
                errorDivTextChange(errorThrown);
                successDivHide();
                processDivHide();
                errorDivShow();
                //btnCloseShow();
                //loaderShowIfProgress();
                
                //alert(errorThrown);
            }
        });
    }
}

</script>
