<script>

jQuery(document).ready(function(){

    jQuery('.btn-clean-cache .cache1').click(function(){

        window.WHAT_CACHE_CLEAN_SELECTED = 'cache1';
        showHideAskDialogWindow(1);
    });

    jQuery('.btn-clean-cache .cache2').click(function(){

        window.WHAT_CACHE_CLEAN_SELECTED = 'cache2';
        showHideAskDialogWindow(1);
    });
    
    //--------------------------------------------------
    window.CONFIRM_BTN_IN_DIALOG.unbind('click');
    window.CONFIRM_BTN_IN_DIALOG.click(function(){

        var
        dataAjax = 'action=clean_cache_agb&'+window.WHAT_CACHE_CLEAN_SELECTED;

        showHideAskDialogWindow(0);
        clean_cache_ajax_agb_handler(false, dataAjax);
    });

    window.CANCEL_BTN_IN_DIALOG.unbind('click');
    window.CANCEL_BTN_IN_DIALOG.click(function(){

        showHideAskDialogWindow(0);
    });
    //--------------------------------------------------
});



function clean_cache_ajax_agb_handler(jThis = false, dataAjax){

loaderShowIfProgress();

jQuery.ajax({
    type: "POST",
    url: "/wp-admin/admin-ajax.php",
    data: dataAjax,
    dataType: "json",
    success: function (data) {

        if (data.status == "success") {

            loaderHideIfProgress();
            loaderImageHide();
            successDivTextChange(data.successes.delete);
            successDivShow();
            btnCloseShow();
            loaderShowIfProgress();
        } else {

            loaderHideIfProgress();
            loaderImageHide();
            errorDivTextChange(data.errors.delete);
            errorDivShow();
            btnCloseShow();
            loaderShowIfProgress();

            //alert("error");
        }
    },
    error: function( jqXHR, textStatus, errorThrown ){
        
        loaderHideIfProgress();
        loaderImageHide();
        errorDivTextChange(errorThrown);
        errorDivShow();
        btnCloseShow();
        loaderShowIfProgress();

        //alert(errorThrown);
    }
});
}

</script>
