<script>
jQuery(document).ready(function(){

    // For in filter refresh actions
    // fast_add_to_cart_and_attrs_marks_actions_refresh();
});

function fast_add_to_cart_and_attrs_marks_actions_refresh(){

    var
    productsVA_plugin = jQuery("#primary ul.products li.product"),
    productsVA_MainPage_plugin = jQuery("#main-page-wrap-elem-agb ul.products li.product"),
    liAttrs_plugin = jQuery(".sizes-of-product-and-other-agb ul li"),
    fastAddToCartBtn_plugin = jQuery(".over-btns-buy-cart-agb .add-to-cart-now-agb ");

    // For all product on page
    reFindAndAddNewMarksToAttrs_in_plugin_agb(productsVA_plugin);
    reFindAndAddNewMarksToAttrs_in_plugin_agb(productsVA_MainPage_plugin);


    // Remove action first, for no duplicate
    liAttrs_plugin.unbind('click');

    liAttrs_plugin.click(function(e){

        // tolko levaya knopka mushi
        if(e.which != 1) return false;

        var 
        selectedSize = jQuery(this),
        allLiOfCurrentAttr = selectedSize.parent().find("li"),
        ofThisAttrProductElem = 
        selectedSize.closest('li.product').find(".sizes-of-product-and-other-agb ul li");

        if(selectedSize.hasClass("inactive")){

            ofThisAttrProductElem.removeClass("active");
        }else{

            allLiOfCurrentAttr.removeClass("active");
        }

        ofThisAttrProductElem.removeClass("available");
        ofThisAttrProductElem.removeClass("inactive");
        selectedSize.addClass("active");

        // For parent product only
        reFindAndAddNewMarksToAttrs_in_plugin_agb(selectedSize.closest('li.product'));

        //alert(selectedSize.attr("attr_available_variations"));
        //alert(selectedSize.find("span").text());
    });


    // Remove action first, for no duplicate
    fastAddToCartBtn_plugin.unbind('click');

    fastAddToCartBtn_plugin.click(function(e){

        // tolko levaya knopka mushi
        if(e.which != 1) return false;

        var 
        thisBtnJ = jQuery(this),
        _product = thisBtnJ.closest('li.product'),
        product_id = thisBtnJ.attr("agb_product_id"),
        outerElem = thisBtnJ.parent().parent(),
        productType = thisBtnJ.attr('agb_product_type'),
        variation_id = 0,
        variation = '',
        attrsSlugs = new Array(),
        attrsSlugsNames = new Array(),
        arrayVariaIds = new Array(),
        variaIds = new Array(),
        saveDifferentIds = new Array(),
        howAllAttrs = 0,
        howActiveAttrs = 0,
        wpTR = window.translate_for_js_fltr_plugin;

        agbSiteLoaderShow();

        if(productType == 'variable'){

            //-----------agb start
            howAllAttrs = thisBtnJ.closest('li.product').find('.sizes-of-product-and-other-agb').length;
            howActiveAttrs = thisBtnJ.closest('li.product').find('.sizes-of-product-and-other-agb ul li.active').length;

            if(howAllAttrs != howActiveAttrs){

                openErrorWindow_plugin(wpTR.no_product_attr_selected);
                return false;
            }

            thisBtnJ.closest('li.product').find('.sizes-of-product-and-other-agb ul li.active').
            each(function(key, elem){

                var 
                jElem = jQuery(elem);

                arrayVariaIds[key] = jElem.attr('attr_available_variations');
                attrsSlugsNames[key] = jElem.attr('attr_slug_name');
                attrsSlugs[key] = jElem.closest('ul').attr('product_attr_slug');
            });
            //----------------------

            variaIds = variaIdsGet_plugin(arrayVariaIds);
            //----------------------

            saveDifferentIds = saveDifferentIdsGet_plugin(variaIds, howAllAttrs);
            //----------------------

            variation_id = correctVariationId_plugin(saveDifferentIds, howAllAttrs, variaIds);
            if(!variation_id) return false;
            //----------------------
            //-----------agb end

            
            for(var i=0; attrsSlugs.length > i; i++){

                variation += '"attribute_'+attrsSlugs[i]+'":"'+attrsSlugsNames[i]+'",';
            }

            variation = '{'+variation+'}';
        }


        dataFastCart = {
            "action" : "my_add_to_cart_variable_product_agb",
            "product_id" : product_id,
            "variation_id" : variation_id,
            "variation" : variation,
            "quantity" : getProductAmountAgb_plugin(_product),
        };

        window.quantityIcre = dataFastCart.quantity;

        jQuery.ajax({
            type: "POST",
            url: "/wp-admin/admin-ajax.php",
            data: dataFastCart,
            dataType: "json",
            success: function (data) {

                if (data.status == "success") {

                    // Refresh fragments of cart for woocommerce 
                    jQuery( document.body ).trigger( 'wc_fragment_refresh' );

                    // Postavit galochky na btn esli dobavleno v korziny
                    if(!thisBtnJ.hasClass("added") && data.galochka == 1){
                        
                        thisBtnJ.addClass("added");
                    }

                    var
                    cartEl = jQuery('#site-header-cart .cart-count .count-number'),
                    // Add quantity becouse delay of cart amount update
                    cAmount = Number(jQuery(cartEl[0]).text()) + Number(window.quantityIcre),
                    cText = jQuery(".fast-add-to-cart-text-agb .go-to-cart-agb").text();
                    
                    jQuery(".fast-add-to-cart-text-agb .go-to-cart-agb .cont-fly").text(cAmount);
                    jQuery(".fast-add-to-cart-text-agb").css("display", "block");

                    setTimeout(function(){

                        jQuery(".fast-add-to-cart-text-agb").fadeOut(400);
                    }, 3000);

                    agbSiteLoaderHide();
                } else {
                    
                    //alert("error");

                    agbSiteLoaderHide();
                }
            },
            error: function( jqXHR, textStatus, errorThrown ){

                //alert(errorThrown);

                agbSiteLoaderHide();
            }
        });
    });
}




function reFindAndAddNewMarksToAttrs_in_plugin_agb(jObjElements){

    var
    arrayVariaIds = new Array();

    // Check each active elem and check it attr_available_variations
    jObjElements.each(function(keyP, elemP){

        jQuery(elemP).find('.sizes-of-product-and-other-agb ul li.active').
        each(function(key, elem){

            arrayVariaIds[key] = jQuery(elem).attr('attr_available_variations');
        });

        var 
        variaIds = '',
        amountLiActive = arrayVariaIds.length;
        for(var i=0; amountLiActive > i; i++){

            // Value example array(213, 216), variation ids get from string and convert to array
            variaIds = arrayVariaIds[i].split(',');
            
            jQuery(elemP).find('.sizes-of-product-and-other-agb ul li').each(function(key2, elem2){

                jElemLi = jQuery(elem2);

                // Enumeration each elem of variation ids for match with other attrs of product
                for(var k=0; variaIds.length > k; k++){

                    // Find variations ids in other attrs of products
                    var res1 = 
                    jElemLi.attr('attr_available_variations').
                    indexOf(variaIds[k], 0);

                    // If variation id was matched in other attr of product, 
                    // mark it as "available" class
                    if(res1 > -1 && !jElemLi.hasClass('available')){

                        if(jElemLi.hasClass('inactive')){

                            jElemLi.removeClass('inactive');
                        }

                        jElemLi.addClass('available');
                    }else{

                        // If variation id not matched in other attr of product 
                        // mark it as "inactive" class
                        if(!jElemLi.hasClass('available')){

                            jElemLi.addClass('inactive');
                            //jElemLi.removeClass('active');
                        }
                    }
                }
            });
        }

        arrayVariaIds = new Array();
        amountLiActive = 0;
    });
}



function variaIdsGet_plugin(arrayVariaIds){

    var 
    variaIds = new Array(),
    amountLiActive = arrayVariaIds.length;

    for(var i=0; amountLiActive > i; i++){

        /* Value example 
            array(
            0 : array(213, 216)
        ), variation ids get from string and convert to array*/
        variaIds[i] = arrayVariaIds[i].split(',');
    }

    return variaIds;
}



function saveDifferentIdsGet_plugin(variaIds, howAllAttrs){

    var 
    saveDifferentIds = new Array(),
    allowAdd = true;
    // If not zero index create zero index and write start value
    if(!saveDifferentIds[0]) {
                        
        saveDifferentIds[0] = variaIds[0][0];
    }

    for(var a=0; howAllAttrs > a; a++){

        for(var k=0; variaIds[a].length > k; k++){

            for(var j=0; saveDifferentIds.length > j; j++){

                if(saveDifferentIds[j] == variaIds[a][k]){

                    allowAdd = false; continue;
                }
            }

            if(allowAdd) saveDifferentIds[saveDifferentIds.length] = variaIds[a][k];
            allowAdd = true;
        }
    }

    return saveDifferentIds;
}



function correctVariationId_plugin(saveDifferentIds, howAllAttrs, variaIds){

    var
    variation_id = false, 
    matchInAll = true,
    matchedInSomePart = false;
    // What variation id match in all attrs
    for(var i=0; saveDifferentIds.length > i; i++){

        for(var a=0; howAllAttrs > a; a++){

            for(var k=0; variaIds[a].length > k; k++){

                if(saveDifferentIds[i] == variaIds[a][k]){

                    matchedInSomePart = true; break;
                }
            }

            if(!matchedInSomePart){

                matchInAll = false; break;
            }else{

                matchedInSomePart = false;
                matchInAll = true;
            }
        }

        if(matchInAll) {
            
            variation_id = saveDifferentIds[i];
            break;
        }
    }

    if(!matchInAll){

        openErrorWindow_plugin(window.translate_for_js_fltr_plugin.no_match_in_all_attrs_product_variation_id);
        return false;
    }

    return variation_id;
}



function rescanAttrsAgb_plugin(jProduct){

    var 
    thisBtnJ = jProduct.find('.add-to-cart-now-agb '),
    productType = thisBtnJ.attr('agb_product_type'),
    variation_id = 0,
    attrsSlugs = new Array(),
    attrsSlugsNames = new Array(),
    arrayVariaIds = new Array(),
    variaIds = new Array(),
    saveDifferentIds = new Array(),
    howAllAttrs = 0,
    howActiveAttrs = 0,
    wpTR = window.translate_for_js_fltr_plugin;

    if(productType == 'variable'){

        //-----------agb start
        howAllAttrs = jProduct.find('.sizes-of-product-and-other-agb').length;
        howActiveAttrs = jProduct.find('.sizes-of-product-and-other-agb ul li.active').length;

        if(howAllAttrs != howActiveAttrs){

            openErrorWindow_plugin(wpTR.no_product_attr_selected);
            return false;
        }

        jProduct.find('.sizes-of-product-and-other-agb ul li.active').
        each(function(key, elem){

            var 
            jElem = jQuery(elem);

            arrayVariaIds[key] = jElem.attr('attr_available_variations');
            attrsSlugsNames[key] = jElem.attr('attr_slug_name');
            attrsSlugs[key] = jElem.closest('ul').attr('product_attr_slug');
        });
        //----------------------

        variaIds = variaIdsGet_plugin(arrayVariaIds);
        saveDifferentIds = saveDifferentIdsGet_plugin(variaIds, howAllAttrs);
        variation_id = correctVariationId_plugin(saveDifferentIds, howAllAttrs, variaIds);
        if(!variation_id) return false;
        //----------------------
        //-----------agb end
    }

    return true;
}
</script>
