<script>
jQuery(document).ready(function(){

    jQuery('.link-for-rename-agb').click(function(e){

        var 
        jThis = jQuery(e.target),

        filter_const_id = jThis.attr('filter_const_id'),

        rename_name = jThis.closest('.has-group-elem').
        find('.filter_existing_name').val(),

        dataAjax = '';
        //-----------------------------------------

        dataAjax = 
        'action=rename_element_agb'+
        '&filter_const_id='+filter_const_id+
        '&rename_name='+rename_name;

        loaderShowIfProgress();

        jQuery.ajax({
            type: "POST",
            url: "/wp-admin/admin-ajax.php",
            data: dataAjax,
            dataType: "json",
            success: function (data) {

                if (data.status == "success") {

                    jThis.closest('.has-group-elem').
                    find('.fields_group_existing_slug').attr('id', data.grp_slug),

                    loaderHideIfProgress();
                    loaderImageHide();
                    successDivTextChange(data.successes.message);
                    successDivShow();
                    btnCloseShow();
                    loaderShowIfProgress();
                } else {
                    
                    loaderHideIfProgress();
                    loaderImageHide();
                    errorDivTextChange(data.errors.message);
                    errorDivShow();
                    btnCloseShow();
                    loaderShowIfProgress();
                    
                    //alert("error");
                }
            },
            error: function( jqXHR, textStatus, errorThrown ){
                
                loaderHideIfProgress();
                loaderImageHide();
                errorDivTextChange(errorThrown);
                errorDivShow();
                btnCloseShow();
                loaderShowIfProgress();
                
                //alert(errorThrown);
            }
        });

        return false;
    });

    

    jQuery('.delete-filter-link-agb').click(function(e){

        var 
        jThis = jQuery(e.target),
        const_id = jThis.attr('filter_const_id'),
        dataAjax = '';

        dataAjax = 'action=delete_element_agb&const_id='+const_id;

        showHideAskDialogWindow(1);
        //--------------------------------------------------

        window.CONFIRM_BTN_IN_DIALOG.unbind('click');
        window.CONFIRM_BTN_IN_DIALOG.click(function(){

            showHideAskDialogWindow(0);
            delete_element_data_agbs_ajax_handler(jThis, dataAjax);
        });

        window.CANCEL_BTN_IN_DIALOG.unbind('click');
        window.CANCEL_BTN_IN_DIALOG.click(function(){

            showHideAskDialogWindow(0);
        });
        //--------------------------------------------------
    });
});



function delete_element_data_agbs_ajax_handler(jThis, dataAjax){

    loaderShowIfProgress();

    jQuery.ajax({
        type: "POST",
        url: "/wp-admin/admin-ajax.php",
        data: dataAjax,
        dataType: "json",
        success: function (data) {

            if (data.status == "success") {

                var 
                li_elem = jThis.closest('li');

                // If selected right elem delete it
                if(Number(li_elem.attr('const_id')) == Number(data.const_id)){

                    li_elem.remove();
                }

                loaderHideIfProgress();
                loaderImageHide();
                successDivTextChange(data.successes.delete);
                successDivShow();
                btnCloseShow();
                loaderShowIfProgress();
            } else {

                loaderHideIfProgress();
                loaderImageHide();
                errorDivTextChange(data.errors.delete);
                errorDivShow();
                btnCloseShow();
                loaderShowIfProgress();

                //alert("error");
            }
        },
        error: function( jqXHR, textStatus, errorThrown ){
            
            loaderHideIfProgress();
            loaderImageHide();
            errorDivTextChange(errorThrown);
            errorDivShow();
            btnCloseShow();
            loaderShowIfProgress();

            //alert(errorThrown);
        }
    });
}
</script>
