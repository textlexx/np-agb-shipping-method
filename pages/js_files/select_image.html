<script>

	jQuery(document).ready(function(){

		var custom_uploader;

		jQuery('.image-select-link').click(function(e) {
			e.preventDefault();

			var upload_button = jQuery(this);

			//Extend the wp.media object
			custom_uploader = wp.media.frames.file_frame = wp.media({
				title: 'Choose Image',
				button: {
					text: 'Choose Image'
				},
				multiple: false
			});

			//When a file is selected, grab the URL and set it as the text field's value
			custom_uploader.on('select', function() {
				var 
				attachment = custom_uploader.state().get('selection').first().toJSON(),

				elementImg = upload_button.closest('.field-image-group').
				siblings('.input-fields-group-img').find('.selected-image-agb');

				upload_button.closest('.field-image-group').
				siblings('.input-fields-group-img').find('.f_g_plg_img_id').val(attachment.id);
				
				elementImg.html('<img style="display:block;" src="'+attachment.url+'">');
			});

			//Open the uploader dialog
			custom_uploader.open();

		});

		jQuery('.delete_image_button').click(function(e) {
			e.preventDefault();

			var del_btn = jQuery(this);

			del_btn.closest('.field-image-group').
			siblings('.input-fields-group-img').find('img').remove();

			del_btn.closest('.field-image-group').
			siblings('.input-fields-group-img').find('.f_g_plg_img_id').val('');

			return false;
		});
	});

</script>
