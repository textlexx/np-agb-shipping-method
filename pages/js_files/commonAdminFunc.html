<script>

window.CONFIRM_BTN_IN_DIALOG = jQuery('.eco-btn-confirm'),
window.CANCEL_BTN_IN_DIALOG = jQuery('.eco-btn-cancel');

jQuery(document).ready(function(){

    addAction_btnCloseHideLoaderWindow();
});




function loaderShowIfProgress(){

    var
    fly = jQuery('.loader-wrap-agb');

    fly.css('display', 'block');
}

function loaderHideIfProgress(){

    var
    fly = jQuery('.loader-wrap-agb');

    fly.css('display', 'none');
    loaderImageShow();
}

function loaderImageShow(){

    var
    elem = jQuery('.has-loader-text-agb .lrdr-img-agb img');

    elem.css('display', 'block');
}

function loaderImageHide(){

    var
    elem = jQuery('.has-loader-text-agb .lrdr-img-agb img');

    elem.css('display', 'none');
}

function btnCloseShow(){

    var
    elem = jQuery('.has-loader-text-agb .lrdr-img-agb .btn-close-agb');

    elem.css('display', 'block');
}

function btnCloseHide(){

    var
    elem = jQuery('.has-loader-text-agb .lrdr-img-agb .btn-close-agb');

    elem.css('display', 'none');
}

function addAction_btnCloseHideLoaderWindow(){

    var
    elem = jQuery('.has-loader-text-agb .lrdr-img-agb .btn-close-agb');

    elem.click(function(){

        loaderHideIfProgress();
        processDivShow();
        btnCloseHide();
    });
}

function processDivShow(){

    var
    elem = jQuery('.loader-mess-body-agb .process-div');

    successDivHide();
    errorDivHide();
    elem.css('display', 'block');
}

function successDivShow(){

    var
    elem = jQuery('.loader-mess-body-agb .success-div');

    processDivHide();
    errorDivHide();
    elem.css('display', 'block');
}

function errorDivShow(){

    var
    elem = jQuery('.loader-mess-body-agb .error-div');

    successDivHide();
    processDivHide();
    elem.css('display', 'block');
}

function processDivHide(){

    var
    elem = jQuery('.loader-mess-body-agb .process-div');

    elem.css('display', 'none');
}

function successDivHide(){

    var
    elem = jQuery('.loader-mess-body-agb .success-div');

    elem.css('display', 'none');
}

function errorDivHide(){

    var
    elem = jQuery('.loader-mess-body-agb .error-div');

    elem.css('display', 'none');
}

function processDivTextChange(text){

    var
    elem = jQuery('.loader-mess-body-agb .process-div');

    elem.html(text);
}

function successDivTextChange(text){

    var
    elem = jQuery('.loader-mess-body-agb .success-div');

    elem.html(text);
}

function errorDivTextChange(text){

    var
    elem = jQuery('.loader-mess-body-agb .error-div');

    elem.html(text);
}



function showHideAskDialogWindow(status = 0){

    var
    flyAsk = jQuery('.wrap-eco-ask-block');

    if(status == 0){

        flyAsk.css('display', 'none');
    }else if(status == 1){

        flyAsk.css('display', 'block');
    }
}

</script>
